<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Império do Cuscuz — Tradição Nordestina</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ════════════════════════════════════════════
           IMPÉRIO DO CUSCUZ — SISTEMA DE CARDÁPIO V2
           ════════════════════════════════════════════ */
        :root {
            --ouro: #E8A917; --ouro-claro: #F5C842; --ouro-escuro: #B8820A;
            --terracota: #C1440E; --terracota-dark: #8F2A00; --marrom: #1E0E04;
            --creme: #FBF6EC; --areia: #F5EDD8; --branco: #FFFDF8; --cinza: #8C7A6B;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'DM Sans', sans-serif; background: var(--creme); color: var(--marrom); overflow-x: hidden; }

        /* NAVBAR */
        nav { background: var(--marrom); position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--ouro); }
        .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 64px; }
        .logo-titulo { font-family: 'Cinzel Decorative', cursive; font-size: 20px; color: var(--ouro); text-decoration: none; font-weight: 900; }

        /* GRID DE PRODUTOS */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .section-header { text-align: center; margin-bottom: 40px; }
        .section-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 42px; }

        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .menu-card { 
            background: var(--branco); border: 1.5px solid var(--areia-dark); 
            border-radius: 16px; overflow: hidden; transition: 0.3s; 
            display: flex; flex-direction: column;
        }
        .menu-card:hover { transform: translateY(-5px); border-color: var(--ouro); }
        
        .card-photo { 
            height: 200px; background: var(--areia); 
            display: flex; align-items: center; justify-content: center; font-size: 60px;
        }

        .card-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-info h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; margin-bottom: 8px; }
        .card-desc { font-size: 13px; color: var(--cinza); margin-bottom: 15px; line-height: 1.4; flex-grow: 1; }
        
        .card-footer { 
            display: flex; align-items: center; justify-content: space-between; 
            padding-top: 15px; border-top: 1px solid var(--areia);
        }
        .price { font-family: 'Cinzel Decorative', cursive; font-weight: 700; color: var(--terracota); font-size: 18px; }
        .add-btn { 
            background: var(--marrom); color: white; border: none; 
            padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 700;
        }
        .add-btn:hover { background: var(--terracota); }

        /* CARRINHO */
        .cart-icon { position: relative; cursor: pointer; font-size: 24px; }
        .cart-count { 
            position: absolute; top: -8px; right: -8px; background: var(--terracota); 
            color: white; border-radius: 50%; width: 20px; height: 20px; 
            font-size: 12px; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="#" class="logo-titulo">IMPÉRIO DO CUSCUZ</a>
        <div class="cart-icon" onclick="alert('Carrinho em desenvolvimento')">
            🛒 <span class="cart-count" id="cart-count">0</span>
        </div>
    </div>
</nav>

<section class="container">
    <div class="section-header">
        <h2>Nosso <em>Cardápio</em></h2>
        <p>Tradição nordestina em cada pedaço</p>
    </div>

    <div class="menu-grid" id="menu-container">
        </div>
</section>

<script>
    /* ════════════════════════════════════════════
       DATABASE DE PRODUTOS — PREÇOS ATUALIZADOS
       ════════════════════════════════════════════ */
    const produtos = [
        { nome: "Cuscuz de Calabresa com Mussarela", preco: 20, desc: "Cuscuz fofinho com calabresa e queijo.", icon: "🥓" },
        { nome: "Carne Seca com Banana e Mussarela", preco: 23, desc: "O clássico doce e salgado irresistível.", icon: "🍌" },
        { nome: "Cuscuz de Carne do Sol", preco: 23, desc: "Carne do sol desfiada na manteiga de garrafa.", icon: "☀️" },
        { nome: "Carne do Sol com Vinagrete", preco: 26, desc: "Acompanha vinagrete fresco da casa.", icon: "🥗" },
        { nome: "Cuscuz Romeu e Julieta", preco: 16, desc: "Queijo coalho com goiabada cascão.", icon: "🧀" },
        { nome: "Cuscuz com Ovo e Manteiga", preco: 16, desc: "Simplicidade e sabor tradicional.", icon: "🍳" },
        { nome: "Pote de Carne Seca com Banana e Queijo", preco: 15, desc: "Praticidade para comer em qualquer lugar.", icon: "🏺" },
        { nome: "Pote de Calabresa e Queijo", preco: 15, desc: "Mix de sabores no pote de 250ml.", icon: "🏺" },
        { nome: "Pote de Carne do Sol", preco: 15, desc: "Carne do sol desfiada premium.", icon: "🏺" },
        { nome: "Pote Cuscuz Tapioca", preco: 16, desc: "Cuscuz de tapioca doce com leite condensado.", icon: "🥥" }
    ];

    /* FUNÇÃO PARA RENDERIZAR O CARDÁPIO */
    function renderMenu() {
        const container = document.getElementById('menu-container');
        container.innerHTML = produtos.map(prod => `
            <div class="menu-card">
                <div class="card-photo">${prod.icon}</div>
                <div class="card-info">
                    <h3>${prod.nome}</h3>
                    <p class="card-desc">${prod.desc}</p>
                    <div class="card-footer">
                        <span class="price">R$ ${prod.preco.toFixed(2)}</span>
                        <button class="add-btn">Adicionar</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // Inicializa o cardápio ao carregar a página
    window.onload = renderMenu;
</script>

</body>
</html>
